<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinhte Chart Builder</title>
<style>
  :root{
    --bg:#111318;--panel:#171A21;--text:#F2F3F5;--muted:#9AA0AA;
    --accent:#E53935;--border:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--text);padding:28px 18px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto}
  h1{font-size:22px;margin-bottom:4px}
  .lead{font-size:13px;color:var(--muted);margin-bottom:24px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
  label:first-child{margin-top:0}
  input[type=text],textarea{
    width:100%;background:#0D0F13;border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:13px;padding:10px 12px;font-family:ui-monospace,Menlo,Consolas,monospace;
  }
  textarea{min-height:280px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .out{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#0D0F13;
       border:1px solid var(--border);border-radius:8px;padding:10px 12px;
       word-break:break-all;max-height:120px;overflow:auto;color:#B9C0CC}
  .btnrow{display:flex;gap:8px;margin-top:8px}
  button{
    background:none;border:1px solid rgba(255,255,255,.18);color:var(--text);
    font-size:12px;padding:7px 14px;border-radius:99px;cursor:pointer;transition:.2s;
  }
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.copied{border-color:#4CAF50;color:#4CAF50}
  .err{color:#FFB4B0;font-size:12px;margin-top:8px;min-height:16px}
  iframe{width:100%;height:430px;border:0;border-radius:12px;margin-top:20px;background:var(--bg)}
  .previewlabel{font-size:12px;color:var(--muted);margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Tinhte Chart Builder</h1>
  <p class="lead">Sửa JSON bên trái → lấy link hoặc mã iframe bên phải, dán vào bài viết. Không cần tạo file mới cho từng chart.</p>

  <div class="grid">
    <div class="panel">
      <label for="json">Số liệu (JSON)</label>
      <textarea id="json" spellcheck="false">{
  "title": "Geekbench 6 — Multi-core",
  "subtitle": "Điểm càng cao càng tốt",
  "unit": "Đơn vị: điểm",
  "source": "Nguồn: Tinhte.vn đo thực tế",
  "items": [
    { "name": "Snapdragon 8 Elite", "value": 10250, "highlight": true },
    { "name": "Apple A18 Pro",      "value": 10080 },
    { "name": "Dimensity 9400",     "value": 9720  },
    { "name": "Snapdragon 8 Gen 3", "value": 7150  },
    { "name": "Exynos 2400",        "value": 6650  }
  ]
}</textarea>
      <div class="err" id="err"></div>
    </div>

    <div class="panel">
      <label for="base">Địa chỉ chart.html đã host (GitHub Pages)</label>
      <input type="text" id="base" value="https://USERNAME.github.io/tinhte-charts/chart.html">

      <label>Link trực tiếp</label>
      <div class="out" id="urlOut"></div>
      <div class="btnrow"><button id="copyUrl" type="button">Copy link</button></div>

      <label>Mã iframe (dán vào bài viết)</label>
      <div class="out" id="iframeOut"></div>
      <div class="btnrow"><button id="copyIframe" type="button">Copy iframe</button></div>
    </div>
  </div>

  <p class="previewlabel">Xem trước (dùng chart.html đặt cùng thư mục với builder):</p>
  <iframe id="preview" title="Xem trước chart"></iframe>
</div>

<script>
/* Mã hoá JSON (UTF-8) -> base64url */
function encodeConfig(obj){
  const bytes = new TextEncoder().encode(JSON.stringify(obj));
  let bin = "";
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

const jsonEl = document.getElementById("json");
const baseEl = document.getElementById("base");
const errEl = document.getElementById("err");
const urlOut = document.getElementById("urlOut");
const iframeOut = document.getElementById("iframeOut");
const preview = document.getElementById("preview");

function update(){
  let cfg;
  try {
    cfg = JSON.parse(jsonEl.value);
    errEl.textContent = "";
  } catch(e){
    errEl.textContent = "JSON chưa hợp lệ: " + e.message;
    return;
  }
  const d = encodeConfig(cfg);
  const base = baseEl.value.trim().replace(/\?.*$/,"");
  const url = base + "?d=" + d;
  const rows = (cfg.items || []).length;
  const height = 180 + rows * 46; // ước lượng chiều cao theo số thanh
  urlOut.textContent = url;
  iframeOut.textContent =
    `<iframe src="${url}" width="100%" height="${height}" frameborder="0" loading="lazy" scrolling="no"></iframe>`;
  preview.src = "chart.html?d=" + d;
  preview.height = height + 40;
}

function bindCopy(btnId, srcEl){
  const btn = document.getElementById(btnId);
  btn.addEventListener("click", async () => {
    await navigator.clipboard.writeText(srcEl.textContent);
    btn.classList.add("copied");
    const old = btn.textContent;
    btn.textContent = "✓ Đã copy";
    setTimeout(() => { btn.classList.remove("copied"); btn.textContent = old; }, 1500);
  });
}
bindCopy("copyUrl", urlOut);
bindCopy("copyIframe", iframeOut);

jsonEl.addEventListener("input", update);
baseEl.addEventListener("input", update);
update();
</script>
</body>
</html>
